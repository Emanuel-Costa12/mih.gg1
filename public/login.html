<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — MIH.GG</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }

.bg-mesh {
  position:fixed; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 70% at 20% 40%, rgba(123,92,222,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(168,240,176,0.07) 0%, transparent 60%);
}
.grid-bg {
  position:fixed; inset:0; pointer-events:none;
  background-image: linear-gradient(rgba(123,92,222,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(123,92,222,0.04) 1px,transparent 1px);
  background-size:60px 60px;
}
#particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

.login-wrap {
  position:relative; z-index:1;
  width:min(420px, 94vw);
  animation:slideUp .8s ease;
}
.login-card {
  background:rgba(22,22,58,0.85);
  border:1px solid var(--border);
  border-radius:20px; padding:44px 40px;
  backdrop-filter:blur(20px);
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
}
.login-header { text-align:center; margin-bottom:36px; }
.login-logo {
  font-family:'Rajdhani',sans-serif;
  font-size:36px; font-weight:700; letter-spacing:7px; color:#fff;
}
.login-logo span { color:var(--green); text-shadow:var(--glow-g); }
.login-tagline { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text2); letter-spacing:3px; margin-top:6px; }

.form-fields { display:flex; flex-direction:column; gap:18px; margin-bottom:24px; }
.field-row { display:flex; flex-direction:column; gap:7px; }
.field-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--green); }
.field-input {
  background:rgba(13,27,75,0.5); border:1.5px solid var(--border);
  color:var(--text); font-family:'Nunito',sans-serif; font-size:15px;
  padding:14px 18px; border-radius:10px; outline:none; width:100%;
  transition:border-color .3s, box-shadow .3s;
}
.field-input:focus { border-color:var(--purple); box-shadow:var(--glow-p); }
.field-input.error { border-color:rgba(255,70,85,0.6); }

.submit-btn {
  width:100%; padding:16px; border:none; border-radius:10px;
  background:linear-gradient(135deg, var(--purple), var(--purple2));
  color:#fff; font-family:'Rajdhani',sans-serif;
  font-size:16px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  cursor:none; transition:transform .2s, box-shadow .2s;
  box-shadow:0 4px 20px rgba(123,92,222,0.35);
}
.submit-btn:hover { transform:translateY(-2px); box-shadow:var(--glow-p); }
.submit-btn:disabled { opacity:.5; transform:none; }

.login-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text2); }
.login-footer a { color:var(--green); text-decoration:none; }
.login-footer a:hover { text-decoration:underline; }

.error-msg {
  background:rgba(255,70,85,0.1); border:1px solid rgba(255,70,85,0.25);
  border-radius:8px; padding:12px 16px;
  font-size:13px; color:#ff7070;
  display:none; margin-bottom:16px;
}
.error-msg.show { display:block; animation:slideUp .3s ease; }

.back-link {
  display:flex; align-items:center; gap:7px;
  color:var(--text2); text-decoration:none; font-size:13px;
  margin-bottom:22px; transition:color .2s;
}
.back-link:hover { color:var(--green); }

.welcome-note {
  background:rgba(168,240,176,0.06); border:1px solid rgba(168,240,176,0.15);
  border-radius:10px; padding:12px 16px;
  font-size:12px; color:var(--text2); line-height:1.6;
  margin-top:20px; text-align:center;
}
.welcome-note strong { color:var(--green); }
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>
<div class="bg-mesh"></div>
<div class="grid-bg"></div>
<canvas id="particle-canvas"></canvas>
<div class="toast-wrap"></div>

<div class="login-wrap">
  <a href="/" class="back-link">← voltar para o site</a>

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">MIH<span>.GG</span></div>
      <div class="login-tagline">// acesso exclusivo</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-fields">
      <div class="field-row">
        <label class="field-label">Usuário</label>
        <input type="text" class="field-input" id="username" placeholder="seu usuário" autocomplete="username">
      </div>
      <div class="field-row">
        <label class="field-label">Senha</label>
        <input type="password" class="field-input" id="password" placeholder="sua senha" autocomplete="current-password">
      </div>
    </div>

    <button class="submit-btn" id="login-btn" onclick="doLogin()">Entrar</button>

    <div class="welcome-note">
      Acesso criado pela <strong>Mih</strong>. Se você é viewer e não tem conta, peça pra ela criar uma pra você! 💜
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
// redirect if already logged in
if (Auth.isLoggedIn()) {
  try {
    fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + Auth.getToken() } })
      .then(r => r.json())
      .then(u => { if (u.id) window.location.href = Auth.isAdmin() ? '/admin' : '/'; });
  } catch {}
}

// particle bg
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let pW, pH, ps = [];
function rsz() { pW = pCanvas.width = window.innerWidth; pH = pCanvas.height = window.innerHeight; }
rsz(); window.addEventListener('resize', rsz);
for (let i=0;i<60;i++) ps.push({ x:Math.random()*pW, y:Math.random()*pH, vx:(Math.random()-.5)*.15, vy:-(Math.random()*.2+.04), r:Math.random()*1.6+.3, a:Math.random()*.2+.05, life:Math.random(), decay:Math.random()*.002+.001, c:['168,240,176','123,92,222','155,109,255'][Math.floor(Math.random()*3)] });
(function loop(){ pCtx.clearRect(0,0,pW,pH); ps.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; if(p.life<=0||p.y<-5){p.x=Math.random()*pW;p.y=pH+5;p.life=1;} pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2); pCtx.fillStyle=`rgba(${p.c},${p.a*p.life})`; pCtx.fill(); }); requestAnimationFrame(loop); })();

hookHover();

// enter key
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('username').classList.add('error');
  document.getElementById('password').classList.add('error');
  setTimeout(() => { el.classList.remove('show'); document.getElementById('username').classList.remove('error'); document.getElementById('password').classList.remove('error'); }, 4000);
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { showError('Preencha todos os campos!'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');

    localStorage.setItem('mih_token', data.token);
    localStorage.setItem('mih_user', JSON.stringify(data.user));

    toast('Bem-vindo(a), ' + (data.user.profile?.displayName || data.user.username) + '! 💜', 'success');
    setTimeout(() => {
      window.location.href = data.user.role === 'admin' ? '/admin' : '/';
    }, 800);
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
